services:


  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  keycloak-service-db:
    image: mysql:8.0
    container_name: keycloak-service-db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    volumes:
      - keycloak-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      retries: 5


  employee-service-db:
    image: mysql:8.0
    container_name: employee-service-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD_EM}
      MYSQL_DATABASE: ${MYSQL_DATABASE_EM}
      MYSQL_USER: ${MYSQL_USER_EM}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD_EM}
    ports:
      - '3307:3306'
    volumes:
      - employee-service-db:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      retries: 5

  organisation-service-db:
    image: mysql:8.0
    container_name: organisation-service-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD_OR}
      MYSQL_DATABASE: ${MYSQL_DATABASE_OR}
      MYSQL_USER: ${MYSQL_USER_OR}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD_OR}
    ports:
      - '3308:3306'
    volumes:
      - organisation-service-db:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      retries: 5

  keycloak-service:
    image: quay.io/keycloak/keycloak:25.0.1
    container_name: keycloak-service
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    depends_on:
      keycloak-service-db:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: mysql
      KC_DB_URL_HOST: keycloak-service-db
      KC_DB_URL_DATABASE: ${MYSQL_DATABASE}
      KC_DB_USERNAME: ${MYSQL_USER}
      KC_DB_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - ./keycloak/realm-microservice.json:/opt/keycloak/data/import/realm-microservice.json
    ports:
      - "8080:8080"


  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - '8761:8761'
    expose:
      - '8761'
    healthcheck:
      test: ["CMD" ,"curl","-f","http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 4

  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - '9999:9999'
    expose:
      - '9999'
    environment:
      - DISCOVERY_SERVICE_URL=http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ,"curl","-f","http://localhost:9999/actuator/health" ]
      interval: 10s
      retries: 4





  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - '8877:8877'
    expose:
      - '8877'
    environment:
      KEYCLOAK_SERVER_URL: http://keycloak-service:8080 
      DISCOVERY_SERVICE_URL: ${DISCOVERY_SERVICE_URL}
      CONFIG_SERVICE_URL: ${CONFIG_SERVICE_URL}
    depends_on:
      - config-service
      - discovery-service
    healthcheck:
      test: [ 'CMD','curl' ,'-f',"http://localhost:8088/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      KEYCLOAK_SERVER_URL: http://keycloak-service:8080 
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      DISCOVERY_SERVICE_URL: ${DISCOVERY_SERVICE_URL}
      CONFIG_SERVICE_URL: ${CONFIG_SERVICE_URL}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    ports:
      - '8092:8092'
    expose:
      - '8092'
    depends_on:
      keycloak-service:
        condition: service_started
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8092/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s



  employee-service:
    build: ./employee-service
    container_name: employee-service
    environment:

      KEYCLOAK_SERVER_URL: http://keycloak-service:8080 

      DISCOVERY_SERVICE_URL: ${DISCOVERY_SERVICE_URL}
      CONFIG_SERVICE_URL: ${CONFIG_SERVICE_URL}
      EMPLOYEE_DATABASE: ${MYSQL_DATABASE_EM}
      EMPLOYEE_HOST: employee-service-db
      EMPLOYEE_USER: ${MYSQL_USER_EM}
      EMPLOYEE_PASSWORD: ${MYSQL_PASSWORD_EM}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    ports:
      - '8091:8091'
    expose:
      - '8091'
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      employee-service-db:
        condition: service_healthy
      auth-service :
        condition : service_healthy

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8091/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s



  organisation-service:
    build: ./organisation-service
    container_name: organisation-service
    environment:
      KEYCLOAK_SERVER_URL: http://keycloak-service:8080 

      DISCOVERY_SERVICE_URL: ${DISCOVERY_SERVICE_URL}
      CONFIG_SERVICE_URL: ${CONFIG_SERVICE_URL}
      ORGANISATION_DATABASE: ${MYSQL_DATABASE_OR}
      ORGANISATION_HOST: employee-service-db
      ORGANISATION_USER: ${MYSQL_USER_OR}
      ORGANISATION_PASSWORD: ${MYSQL_PASSWORD_OR}
    ports:
      - '8090:8090'
    expose:
      - '8090'
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      organisation-service-db:
        condition: service_healthy

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8091/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s




volumes:
  keycloak-db-data:
  employee-service-db:
  organisation-service-db:


